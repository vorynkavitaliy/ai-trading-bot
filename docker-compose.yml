version: '3.8'

services:
  ai-trading-bot:
    build: .
    container_name: ai-trading-bot
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      # Add your API keys here (or use .env file)
      # - BINANCE_API_KEY=your_api_key
      # - BINANCE_API_SECRET=your_api_secret
    command: ["python", "main.py", "--mode", "paper", "--log-level", "INFO"]
    restart: unless-stopped
    
